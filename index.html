<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Семейные финансы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0A0A0F;color:#fff;-webkit-font-smoothing:antialiased}
:root{--card:#16161E;--card2:#1C1C26;--lift:#22222E;--brd:rgba(255,255,255,.06);--txt2:#8A8A9A;--txt3:#4A4A5A;--green:#28C248;--green-dim:rgba(40,194,72,.10);--red:#E8413A;--red-dim:rgba(232,65,58,.10);--blue:#0A84FF;--blue-dim:rgba(10,132,255,.13);--pink:#E8356A;--pink-dim:rgba(232,53,106,.13);--r:16px;--rm:12px}
.app{max-width:390px;margin:0 auto;padding:0 0 84px;min-height:100vh}
.nav{background:rgba(10,10,15,.92);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:30;padding:8px;display:flex;align-items:center;gap:3px}
.nav-btn{flex:1;padding:7px 3px 6px;font-size:9px;font-weight:600;color:#3A3A4A;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:10px;letter-spacing:.03em;text-transform:uppercase;font-family:inherit;transition:color .15s}
.nav-btn .ni{font-size:16px;line-height:1}
.nav-btn:hover{color:#6A6A7A}
.nav-btn.disabled{opacity:.2;cursor:not-allowed}
.nav-badge{font-size:7px;background:#1A1A22;color:#3A3A4A;border-radius:5px;padding:1px 4px}
.header{padding:22px 20px 4px;display:flex;align-items:center;justify-content:space-between}
.header h2{font-size:22px;font-weight:700;letter-spacing:-.4px}
.sync-wrap{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px}
.sync-wrap.ok{background:rgba(40,194,72,.1);color:#28C248}
.sync-wrap.loading{background:rgba(255,255,255,.06);color:#6A6A7A}
.sync-wrap.err{background:rgba(232,65,58,.1);color:#E8413A}
.spinner{width:10px;height:10px;border:1.5px solid rgba(255,255,255,.1);border-top-color:#8A8A9A;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{display:none;padding:0 20px;animation:fadeIn .18s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.lbl{font-size:10px;font-weight:600;color:#3A3A4A;text-transform:uppercase;letter-spacing:.09em;margin:18px 0 8px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{border-radius:20px;padding:16px;position:relative;overflow:hidden;transition:transform .2s}
.stat-card:hover{transform:translateY(-1px)}
.stat-card.inc{background:linear-gradient(145deg,#111B14,#131E15)}
.stat-card.exp{background:linear-gradient(145deg,#1B1111,#1E1313)}
.stat-card::after{content:'';position:absolute;inset:0;border-radius:20px;border:1px solid rgba(255,255,255,.05);pointer-events:none}
.stat-glow{position:absolute;width:60px;height:60px;border-radius:50%;filter:blur(28px);right:-4px;top:-4px;opacity:.3}
.stat-glow.inc{background:#28C248}
.stat-glow.exp{background:#E8413A}
.stat-lbl{font-size:10px;font-weight:600;color:#4A4A5A;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.6px;line-height:1;margin-bottom:7px}
.stat-val.inc{color:#28C248}
.stat-val.exp{color:#E8413A}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.delta.bad{background:rgba(232,65,58,.14);color:#E8413A}
.delta.good{background:rgba(40,194,72,.12);color:#28C248}
.delta.muted{background:rgba(255,255,255,.06);color:#6A6A7A}
.analytics-btn{width:100%;padding:13px 16px;background:#16161E;border-radius:var(--rm);font-size:14px;font-weight:500;color:#8A8A9A;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-family:inherit;border:1px solid rgba(255,255,255,.06);transition:background .15s,color .2s}
.analytics-btn:hover{background:#1C1C26;color:#fff}
.tx-list{display:flex;flex-direction:column;gap:2px}
.tx-item{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:var(--rm);background:transparent;transition:background .15s,transform .12s}
.tx-item:hover{background:#16161E;transform:translateX(2px)}
.tx-icon{width:40px;height:40px;border-radius:11px;background:#1C1C26;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-meta{font-size:11px;color:#4A4A5A;margin-top:2px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amt{font-size:15px;font-weight:700;letter-spacing:-.2px}
.tx-amt.income{color:#28C248}
.tx-amt.expense{color:#E8413A}
.tx-who{font-size:10px;color:#4A4A5A;margin-top:2px}
.tx-acts{display:flex;gap:4px;margin-top:4px;justify-content:flex-end}
.tx-act{background:none;border:1px solid rgba(255,255,255,.07);border-radius:6px;color:#4A4A5A;cursor:pointer;font-size:11px;padding:2px 7px;transition:all .15s;font-family:inherit}
.tx-act:hover{border-color:rgba(255,255,255,.18);color:#fff}
.tx-act.del:hover{border-color:#E8413A;color:#E8413A}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 15px;border-radius:50px;font-size:13px;font-weight:500;font-family:inherit;border:1.5px solid rgba(255,255,255,.08);background:#16161E;color:#4A4A5A;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s,background .15s}
.chip:hover{border-color:rgba(255,255,255,.18);color:#8A8A9A}
.chip:active{transform:scale(.95)}
.chip.on-blue{border-color:#0A84FF!important;color:#0A84FF!important;background:rgba(10,132,255,.13)!important}
.chip.on-pink{border-color:#E8356A!important;color:#E8356A!important;background:rgba(232,53,106,.13)!important}
.chip.on-red{border-color:#E8413A!important;color:#E8413A!important;background:rgba(232,65,58,.13)!important}
.chip.on-green{border-color:#28C248!important;color:#28C248!important;background:rgba(40,194,72,.12)!important}
.chip.on-white{border-color:rgba(255,255,255,.35)!important;color:#ddd!important;background:rgba(255,255,255,.07)!important}
.chip.on-cat{border-color:rgba(255,255,255,.3)!important;color:#fff!important;background:rgba(255,255,255,.08)!important}
.form-section{display:flex;flex-direction:column;gap:18px;padding-top:2px}
.field-lbl{font-size:10px;font-weight:600;color:#4A4A5A;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.amount-card{background:#16161E;border-radius:20px;padding:18px;display:flex;align-items:center;gap:8px;border:1.5px solid transparent;transition:border-color .2s}
.amount-card:focus-within{border-color:rgba(40,194,72,.28)}
.curr-sym{font-size:30px;font-weight:700;color:#4A4A5A;flex-shrink:0}
.amount-input{font-size:42px;font-weight:700;border:none;background:none;color:#fff;width:100%;outline:none;letter-spacing:-1px;font-family:'Inter',system-ui,sans-serif}
.amount-input::placeholder{color:#2A2A38}
input[type="date"],textarea,select{width:100%;padding:12px 15px;border:1.5px solid rgba(255,255,255,.06);border-radius:var(--rm);background:#16161E;color:#fff;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input[type="date"]:focus,textarea:focus{border-color:rgba(255,255,255,.18)}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.4);cursor:pointer}
textarea{resize:none;height:54px}
.submit-btn{width:100%;padding:15px;background:#28C248;color:#000;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.curr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.curr-opt{padding:11px 13px;background:#16161E;border-radius:var(--rm);cursor:pointer;display:flex;align-items:center;gap:8px;border:1.5px solid transparent;transition:all .15s}
.curr-opt:hover{background:#1C1C26}
.curr-opt.selected{border-color:#28C248!important;background:rgba(40,194,72,.08)!important}
.curr-opt.selected .c-sym,.curr-opt.selected .c-name{color:#28C248!important}
.c-sym{font-size:14px;color:#4A4A5A;width:18px;text-align:center}
.c-name{font-size:12px;font-weight:500;color:#8A8A9A}
.c-code{font-size:10px;color:#3A3A4A;margin-left:auto}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#16161E;border-radius:var(--rm);margin-bottom:6px}
.cat-left{display:flex;align-items:center;gap:10px}
.cat-ew{width:30px;height:30px;border-radius:8px;background:#22222E;display:flex;align-items:center;justify-content:center;font-size:15px}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.badge.income{background:rgba(40,194,72,.12);color:#28C248}
.badge.expense{background:rgba(232,65,58,.10);color:#E8413A}
.del-btn{background:none;border:none;color:#3A3A4A;cursor:pointer;font-size:13px;padding:4px 7px;transition:color .15s}
.del-btn:hover{color:#E8413A}
.add-cat-form{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.add-cat-form input,.add-cat-form select{padding:10px 12px;border:1.5px solid rgba(255,255,255,.06);border-radius:var(--rm);background:#16161E;color:#fff;font-size:13px;font-family:inherit;outline:none}
.add-cat-form input{flex:1;min-width:88px}
.add-cat-form select{flex:0 0 auto;width:auto}
.add-btn{padding:9px 13px;background:rgba(255,255,255,.08);color:#fff;border:none;border-radius:var(--rm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap}
.add-btn:hover{background:rgba(255,255,255,.13)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:50;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#111118;border-top:1px solid rgba(255,255,255,.07);border-radius:26px 26px 0 0;padding:10px 20px 40px;width:100%;max-width:390px;max-height:90vh;overflow-y:auto}
.mhandle{width:34px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:17px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.2px}
.mclose{background:rgba(255,255,255,.07);border:none;color:#8A8A9A;cursor:pointer;width:26px;height:26px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:rgba(255,255,255,.14)}
.edit-form{display:flex;flex-direction:column;gap:14px}
.edit-aw{background:#16161E;border-radius:14px;padding:14px;display:flex;align-items:center;gap:6px;border:1.5px solid transparent;transition:border-color .2s}
.edit-aw:focus-within{border-color:rgba(40,194,72,.28)}
.edit-amt{font-size:30px;font-weight:700;border:none;background:none;color:#fff;width:100%;outline:none;font-family:inherit}
.mactions{display:flex;gap:8px;margin-top:4px}
.msave{flex:1;padding:13px;background:#28C248;color:#000;border:none;border-radius:var(--rm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.msave:hover{opacity:.9}
.mcancel{padding:13px 16px;background:#16161E;color:#8A8A9A;border:1.5px solid rgba(255,255,255,.06);border-radius:var(--rm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.mcancel:hover{border-color:rgba(255,255,255,.2);color:#fff}
.pie-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.legend{display:flex;flex-direction:column;gap:7px;width:100%}
.legend-item{display:flex;align-items:center;gap:9px;font-size:13px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:#3A3A4A;font-size:13px;line-height:1.9}
.empty-ico{font-size:36px;margin-bottom:10px}
.err-banner{background:rgba(232,65,58,.1);border:1px solid rgba(232,65,58,.2);border-radius:var(--rm);padding:12px 14px;font-size:12px;color:#E8413A;margin-bottom:14px;display:none;line-height:1.5}
.err-banner.show{display:block}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.94);color:#000;padding:9px 20px;border-radius:50px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:400;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.3)}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
<div class="nav">
  <button class="nav-btn" onclick="go('home')" id="nav-home"><span class="ni">📊</span>Сводка</button>
  <button class="nav-btn" onclick="go('add')" id="nav-add"><span class="ni">➕</span>Добавить</button>
  <button class="nav-btn" onclick="go('list')" id="nav-list"><span class="ni">📋</span>Операции</button>
  <button class="nav-btn disabled" onclick="soon('Задачи')"><span class="ni">✅</span>Задачи<span class="nav-badge">скоро</span></button>
  <button class="nav-btn disabled" onclick="soon('Кал-рь')"><span class="ni">📅</span>Кал-рь<span class="nav-badge">скоро</span></button>
  <button class="nav-btn" onclick="go('settings')" id="nav-settings"><span class="ni">⚙️</span>Настройки</button>
</div>

<div class="header">
  <h2 id="screen-title">Сводка</h2>
  <div class="sync-wrap loading" id="sync-wrap">
    <div class="spinner" id="sync-spinner"></div>
    <span id="sync-text">Загрузка</span>
  </div>
</div>

<div class="screen" id="screen-home">
  <div class="err-banner" id="err-banner"></div>
  <div class="lbl">Сегодня</div>
  <div class="stats-grid">
    <div class="stat-card inc"><div class="stat-glow inc"></div><div class="stat-lbl">Доходы</div><div class="stat-val inc" id="today-income">₽ 0</div><div id="d-ti"></div></div>
    <div class="stat-card exp"><div class="stat-glow exp"></div><div class="stat-lbl">Расходы</div><div class="stat-val exp" id="today-expense">₽ 0</div><div id="d-te"></div></div>
  </div>
  <div class="lbl">Этот месяц</div>
  <div class="stats-grid">
    <div class="stat-card inc"><div class="stat-glow inc"></div><div class="stat-lbl">Доходы</div><div class="stat-val inc" id="month-income">₽ 0</div><div id="d-mi"></div></div>
    <div class="stat-card exp"><div class="stat-glow exp"></div><div class="stat-lbl">Расходы</div><div class="stat-val exp" id="month-expense">₽ 0</div><div id="d-me"></div></div>
  </div>
  <button class="analytics-btn" onclick="openAnalytics()"><span style="display:flex;align-items:center;gap:8px">🥧 Круговая диаграмма</span><span style="color:#3A3A4A">→</span></button>
  <div class="lbl">Последние операции</div>
  <div class="tx-list" id="home-txlist"></div>
</div>

<div class="screen" id="screen-add">
  <div class="form-section">
    <div><div class="field-lbl">Кто добавляет</div>
      <div class="chips">
        <button class="chip on-blue" id="form-vova" onclick="setUser('Вова')">🙋‍♂️ Вова</button>
        <button class="chip" id="form-yulia" onclick="setUser('Юля')">🙋‍♀️ Юля</button>
      </div>
    </div>
    <div><div class="field-lbl">Тип операции</div>
      <div class="chips">
        <button class="chip on-red" id="btn-expense" onclick="setType('expense')">💸 Расход</button>
        <button class="chip" id="btn-income" onclick="setType('income')">💰 Доход</button>
      </div>
    </div>
    <div><div class="field-lbl">Сумма</div>
      <div class="amount-card"><span class="curr-sym" id="curr-sym">₽</span><input class="amount-input" type="number" id="amount-input" placeholder="0" inputmode="decimal"></div>
    </div>
    <div><div class="field-lbl">Категория</div><div class="chips" id="cat-chips"></div></div>
    <div><div class="field-lbl">Дата</div><input type="date" id="date-input"></div>
    <div><div class="field-lbl">Комментарий</div><textarea id="comment-input" placeholder="Необязательно..."></textarea></div>
    <button class="submit-btn" id="save-btn" onclick="addTx()">Сохранить</button>
  </div>
</div>

<div class="screen" id="screen-list">
  <div class="chips" style="margin-bottom:14px;gap:6px">
    <button class="chip on-white" onclick="togF('all')" id="f-all" style="padding:7px 13px;font-size:12px">Все</button>
    <button class="chip" onclick="togF('income')" id="f-income" style="padding:7px 13px;font-size:12px">💰 Доходы</button>
    <button class="chip" onclick="togF('expense')" id="f-expense" style="padding:7px 13px;font-size:12px">💸 Расходы</button>
    <button class="chip" onclick="togF('vova')" id="f-vova" style="padding:7px 13px;font-size:12px">🙋‍♂️ Вова</button>
    <button class="chip" onclick="togF('yulia')" id="f-yulia" style="padding:7px 13px;font-size:12px">🙋‍♀️ Юля</button>
  </div>
  <div class="tx-list" id="main-txlist"></div>
</div>

<div class="screen" id="screen-settings">
  <div class="lbl">Валюта</div>
  <div class="curr-grid" id="currency-grid"></div>
  <div class="lbl">Добавить категорию</div>
  <div class="add-cat-form">
    <input id="new-cat-emoji" placeholder="😀" style="width:46px;flex:none;text-align:center;font-size:17px" maxlength="2">
    <input id="new-cat-name" placeholder="Название">
    <select id="new-cat-type"><option value="expense">Расход</option><option value="income">Доход</option></select>
    <button class="add-btn" onclick="addCat()">+ Добавить</button>
  </div>
  <div class="lbl">Расходы</div><div id="cat-expense-list"></div>
  <div class="lbl">Доходы</div><div id="cat-income-list"></div>
</div>
</div>

<div class="modal-overlay" id="analytics-modal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">🥧 Круговая диаграмма<button class="mclose" onclick="closeAnalytics()">✕</button></div>
    <div class="chips" style="margin-bottom:14px;gap:6px">
      <button class="chip on-red" id="ptab-expense" onclick="setPie('type','expense')" style="padding:7px 12px;font-size:12px">💸 Расходы</button>
      <button class="chip" id="ptab-income" onclick="setPie('type','income')" style="padding:7px 12px;font-size:12px">💰 Доходы</button>
      <button class="chip on-white" id="ptab-all" onclick="setPie('who','all')" style="padding:7px 12px;font-size:12px">👥 Все</button>
      <button class="chip" id="ptab-vova" onclick="setPie('who','Вова')" style="padding:7px 12px;font-size:12px">🙋‍♂️ Вова</button>
      <button class="chip" id="ptab-yulia" onclick="setPie('who','Юля')" style="padding:7px 12px;font-size:12px">🙋‍♀️ Юля</button>
    </div>
    <div class="pie-wrap"><canvas id="pie-canvas" width="200" height="200"></canvas><div class="legend" id="pie-legend"></div></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Редактировать<button class="mclose" onclick="closeEdit()">✕</button></div>
    <div class="edit-form">
      <div><div class="field-lbl" style="margin-bottom:7px">Кто</div>
        <div class="chips"><button class="chip on-blue" id="edit-vova" onclick="eSetUser('Вова')">🙋‍♂️ Вова</button><button class="chip" id="edit-yulia" onclick="eSetUser('Юля')">🙋‍♀️ Юля</button></div>
      </div>
      <div><div class="field-lbl" style="margin-bottom:7px">Тип</div>
        <div class="chips"><button class="chip on-red" id="edit-expense" onclick="eSetType('expense')">💸 Расход</button><button class="chip" id="edit-income" onclick="eSetType('income')">💰 Доход</button></div>
      </div>
      <div><div class="field-lbl" style="margin-bottom:7px">Сумма</div>
        <div class="edit-aw"><span class="curr-sym" id="edit-curr-sym" style="font-size:24px">₽</span><input class="edit-amt" type="number" id="edit-amount" inputmode="decimal"></div>
      </div>
      <div><div class="field-lbl" style="margin-bottom:7px">Категория</div><div class="chips" id="edit-cat-chips"></div></div>

<script type="module">

function setSyncStatus(state,msg){
  const wrap=document.getElementById('sync-wrap'),spin=document.getElementById('sync-spinner'),txt=document.getElementById('sync-text');
  if(state==='ok'){wrap.className='sync-wrap ok';spin.style.display='none';txt.textContent='☁️ Синхронизировано';}
  else if(state==='loading'){wrap.className='sync-wrap loading';spin.style.display='block';txt.textContent='Загрузка...';}
  else{wrap.className='sync-wrap err';spin.style.display='none';txt.textContent='⚠️ '+(msg||'Офлайн');}
}
function showErr(msg){const b=document.getElementById('err-banner');b.textContent=msg;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),7000);}
function lsave(){try{localStorage.setItem('ff_v1',JSON.stringify({cats:S.cats,txs:S.txs,user:S.user,currency:S.currency}));}catch(e){}}
function lload(){try{const p=JSON.parse(localStorage.getItem('ff_v1')||'{}');if(p.cats&&p.cats.length)S.cats=p.cats;if(p.txs)S.txs=p.txs;if(p.user)S.user=p.user;if(p.currency)S.currency=p.currency;}catch(e){}}

async function loadCloud(){
  setSyncStatus('loading');
  try{
    const [cRes,tRes]=await Promise.all([
      sb.from('categories').select('*').eq('family_id',FID).order('created_at'),
      sb.from('transactions').select('*').eq('family_id',FID).order('date',{ascending:false})
    ]);
    if(cRes.error) throw new Error('categories: '+cRes.error.message);
    if(tRes.error) throw new Error('transactions: '+tRes.error.message);
    if(cRes.data.length===0){
      const rows=DCATS.map(c=>({id:c.id,name:c.name,type:c.type,emoji:c.emoji,family_id:FID}));
      const {error:se}=await sb.from('categories').upsert(rows,{onConflict:'id'});
      if(se) throw new Error('seed: '+se.message);
      S.cats=[...DCATS];
    } else {
      S.cats=cRes.data.map(r=>({id:r.id,name:r.name,type:r.type,emoji:r.emoji||'📌'}));
    }
    S.txs=tRes.data.map(r=>({id:r.id,amount:Number(r.amount),type:r.type,cat:r.category_id,by:r.created_by,date:r.date,comment:r.comment||'',cur:r.currency||'RUB'}));
    lsave(); setSyncStatus('ok');
  }catch(e){
    console.error(e); setSyncStatus('err',e.message.slice(0,35));
    showErr('Ошибка Supabase: '+e.message); lload();
    if(!S.cats.length) S.cats=[...DCATS];
  }
  rChips(); rHome();
}

function getCurr(){return CURS.find(c=>c.code===S.currency)||CURS[0];}
function fmtN(n,code){const c=code?CURS.find(x=>x.code===code)||CURS[0]:getCurr();return c.sym+'\u00A0'+Math.round(Math.abs(n)).toLocaleString('ru-RU');}
function todayS(){return new Date().toISOString().slice(0,10);}
function yestS(){return new Date(Date.now()-86400000).toISOString().slice(0,10);}
function fmtD(d){
  const tod=todayS(),yes=yestS(),tom=new Date(Date.now()+86400000).toISOString().slice(0,10);
  if(d===tod)return'Сегодня';if(d===yes)return'Вчера';if(d===tom)return'Завтра';
  const[yr,mo,dy]=d.split('-');const ms=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return`${parseInt(dy)} ${ms[parseInt(mo)-1]}${parseInt(yr)!==new Date().getFullYear()?' '+yr:''}`;
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
window.soon=n=>toast('⏳ '+n+' — скоро!');
function getC(id){return S.cats.find(x=>x.id===id);}

window.go=function(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>{b.style.color='#3A3A4A';b.style.background='transparent';});
  document.getElementById('screen-'+name).classList.add('active');
  const nb=document.getElementById('nav-'+name);
  if(nb){nb.style.color='#ffffff';nb.style.background='#2A2A38';}
  const titles={home:'Сводка',add:'Добавить',list:'Операции',settings:'Настройки'};
  document.getElementById('screen-title').textContent=titles[name]||'';
  if(name==='home')rHome();
  if(name==='list')rList();
  if(name==='settings')rSettings();
  if(name==='add'){S.selCat=null;rChips();document.getElementById('curr-sym').textContent=getCurr().sym;document.getElementById('date-input').value=todayS();}
};

window.setUser=function(u){S.user=u;document.getElementById('form-vova').className='chip'+(u==='Вова'?' on-blue':'');document.getElementById('form-yulia').className='chip'+(u==='Юля'?' on-pink':'');lsave();};
window.setType=function(t){S.txType=t;S.selCat=null;document.getElementById('btn-expense').className='chip'+(t==='expense'?' on-red':'');document.getElementById('btn-income').className='chip'+(t==='income'?' on-green':'');rChips();};
function rChips(){document.getElementById('cat-chips').innerHTML=S.cats.filter(c=>c.type===S.txType).map(c=>`<button class="chip${S.selCat===c.id?' on-cat':''}" onclick="selCat('${c.id}')">${c.emoji} ${c.name}</button>`).join('')||'<span style="color:#4A4A5A;font-size:13px">Нет категорий</span>';}
window.selCat=id=>{S.selCat=id;rChips();};

window.addTx=async function(){
  const amt=parseFloat(document.getElementById('amount-input').value);
  if(!amt||amt<=0){toast('Введите сумму');return;}
  if(!S.selCat){toast('Выберите категорию');return;}
  const comment=document.getElementById('comment-input').value.trim();
  const date=document.getElementById('date-input').value||todayS();
  const id='tx'+Date.now();
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Сохраняем...';
  S.txs.unshift({id,amount:amt,type:S.txType,cat:S.selCat,by:S.user,date,comment,cur:S.currency});
  lsave(); rHome(); setSyncStatus('loading');
  try{
    const {error}=await sb.from('transactions').insert({id,amount:amt,type:S.txType,category_id:S.selCat,created_by:S.user,date,comment,currency:S.currency,family_id:FID});
    if(error) throw new Error(error.message);
    setSyncStatus('ok');toast('✅ Сохранено!');
  }catch(e){setSyncStatus('err');showErr('Ошибка сохранения: '+e.message);}
  btn.disabled=false;btn.textContent='Сохранить';
  document.getElementById('amount-input').value='';document.getElementById('comment-input').value='';

window.delTx=async function(id){
  S.txs=S.txs.filter(t=>t.id!==id);lsave();rList();rHome();

};

  S.eId=id;S.eUser=tx.by;S.eType=tx.type;S.eCat=tx.cat;

  eSetUser(tx.by);eSetType(tx.type,false);rEditChips();

window.closeEdit=()=>document.getElementById('edit-modal').classList.remove('open');
window.eSetUser=function(u){S.eUser=u;document.getElementById('edit-vova').className='chip'+(u==='Вова'?' on-blue':'');document.getElementById('edit-yulia').className='chip'+(u==='Юля'?' on-pink':'');};
window.eSetType=function(t,re=true){S.eType=t;document.getElementById('edit-expense').className='chip'+(t==='expense'?' on-red':'');document.getElementById('edit-income').className='chip'+(t==='income'?' on-green':'');if(re)rEditChips();};
function rEditChips(){document.getElementById('edit-cat-chips').innerHTML=S.cats.filter(c=>c.type===S.eType).map(c=>`<button class="chip${S.eCat===c.id?' on-cat':''}" style="padding:7px 11px;font-size:12px" onclick="eSelCat('${c.id}')">${c.emoji} ${c.name}</button>`).join('');}
window.eSelCat=id=>{S.eCat=id;rEditChips();};
window.saveEdit=async function(){
  const amt=parseFloat(document.getElementById('edit-amount').value);
  if(!amt||amt<=0){toast('Введите сумму');return;}if(!S.eCat){toast('Выберите категорию');return;}
  const date=document.getElementById('edit-date').value||todayS(),comment=document.getElementById('edit-comment').value.trim();
  const idx=S.txs.findIndex(t=>t.id===S.eId);
  if(idx!==-1)S.txs[idx]={...S.txs[idx],amount:amt,type:S.eType,cat:S.eCat,by:S.eUser,date,comment};
  lsave();closeEdit();rList();rHome();setSyncStatus('loading');
  try{const {error}=await sb.from('transactions').update({amount:amt,type:S.eType,category_id:S.eCat,created_by:S.eUser,date,comment}).eq('id',S.eId);if(error)throw new Error(error.message);setSyncStatus('ok');toast('✅ Изменено!');}
  catch(e){setSyncStatus('err');showErr('Ошибка: '+e.message);}
};

function txHTML(tx,acts){
  const cat=getC(tx.cat),sign=tx.type==='income'?'+ ':'− ',who=tx.by==='Вова'?'🙋‍♂️ Вова':'🙋‍♀️ Юля',cmt=tx.comment?' · '+tx.comment:'';
  const ab=acts?`<div class="tx-acts"><button class="tx-act" onclick="openEdit('${tx.id}')">✏️</button><button class="tx-act del" onclick="delTx('${tx.id}')">🗑</button></div>`:'';
  return`<div class="tx-item"><div class="tx-icon">${cat?cat.emoji:'📌'}</div><div class="tx-info"><div class="tx-cat">${cat?cat.name:'—'}${cmt}</div><div class="tx-meta">${fmtD(tx.date)}</div></div><div class="tx-right"><div class="tx-amt ${tx.type}">${sign}${fmtN(tx.amount,tx.cur)}</div><div class="tx-who">${who}</div>${ab}</div></div>`;
}

function renderDelta(elId,cur,prev,type,suffix){
  const el=document.getElementById(elId);if(!el)return;
  if(cur===0&&prev===0){el.innerHTML='';return;}
  const diff=cur-prev;if(Math.abs(diff)<0.5){el.innerHTML=`<span class="delta muted">= как ${suffix}</span>`;return;}
  const abs=Math.round(Math.abs(diff)),sym=getCurr().sym,sign=diff>0?'▲ ':'▼ ';
  const cls=type==='expense'?(diff>0?'bad':'good'):(diff>0?'good':'muted');
  el.innerHTML=`<span class="delta ${cls}">${sign}${sym}\u00A0${abs.toLocaleString('ru-RU')} ${suffix}</span>`;
}

function rHome(){
  const tod=todayS(),yes=yestS(),mo=tod.slice(0,7);
  const lm=new Date();lm.setMonth(lm.getMonth()-1);const lmStr=lm.toISOString().slice(0,7);
  let ti=0,te=0,mi=0,me=0,yi=0,ye=0,lmi=0,lme=0;
  S.txs.forEach(tx=>{
    if(tx.date===tod){if(tx.type==='income')ti+=tx.amount;else te+=tx.amount;}
    if(tx.date===yes){if(tx.type==='income')yi+=tx.amount;else ye+=tx.amount;}
    if(tx.date.startsWith(mo)){if(tx.type==='income')mi+=tx.amount;else me+=tx.amount;}
    if(tx.date.startsWith(lmStr)){if(tx.type==='income')lmi+=tx.amount;else lme+=tx.amount;}
  });
  document.getElementById('today-income').textContent=fmtN(ti);document.getElementById('today-expense').textContent=fmtN(te);
  document.getElementById('month-income').textContent=fmtN(mi);document.getElementById('month-expense').textContent=fmtN(me);
  renderDelta('d-ti',ti,yi,'income','к вчера');renderDelta('d-te',te,ye,'expense','к вчера');
  renderDelta('d-mi',mi,lmi,'income','к пр. мес.');renderDelta('d-me',me,lme,'expense','к пр. мес.');
  document.getElementById('home-txlist').innerHTML=S.txs.slice(0,5).length?S.txs.slice(0,5).map(t=>txHTML(t,false)).join(''):'<div class="empty"><div class="empty-ico">💸</div>Пока нет операций<br><span style="color:#2A2A38">Добавь первую — займёт 3 секунды 👇</span></div>';
}

window.togF=function(f){
  if(f==='all'){S.filters=new Set(['all']);}else{S.filters.delete('all');if(S.filters.has(f))S.filters.delete(f);else S.filters.add(f);if(!S.filters.size)S.filters.add('all');}
  const map={all:'on-white',income:'on-green',expense:'on-red',vova:'on-blue',yulia:'on-pink'};
  ['all','income','expense','vova','yulia'].forEach(x=>{const el=document.getElementById('f-'+x);if(el){el.className='chip'+(S.filters.has(x)?' '+map[x]:'');el.style.cssText='padding:7px 13px;font-size:12px';}});
  rList();
};
function filt(txs){
  if(S.filters.has('all'))return txs;
  return txs.filter(t=>{
    const tOk=(!S.filters.has('income')&&!S.filters.has('expense'))||S.filters.has(t.type);
    const wOk=(!S.filters.has('vova')&&!S.filters.has('yulia'))||(S.filters.has('vova')&&t.by==='Вова')||(S.filters.has('yulia')&&t.by==='Юля');
    return tOk&&wOk;
  });
}
function rList(){document.getElementById('main-txlist').innerHTML=filt(S.txs).length?filt(S.txs).map(t=>txHTML(t,true)).join(''):'<div class="empty"><div class="empty-ico">🔍</div>Нет операций по фильтру</div>';}

function rSettings(){
  document.getElementById('currency-grid').innerHTML=CURS.map(c=>`<div class="curr-opt${c.code===S.currency?' selected':''}" onclick="setCur('${c.code}')"><span class="c-sym">${c.sym}</span><span class="c-name">${c.name}</span><span class="c-code">${c.code}</span></div>`).join('');
  ['expense','income'].forEach(type=>{document.getElementById('cat-'+type+'-list').innerHTML=S.cats.filter(c=>c.type===type).map(c=>`<div class="cat-row"><div class="cat-left"><div class="cat-ew">${c.emoji}</div><span style="font-size:14px;font-weight:500">${c.name}</span></div><div style="display:flex;align-items:center;gap:8px"><span class="badge ${c.type}">${type==='income'?'Доход':'Расход'}</span><button class="del-btn" onclick="delCat('${c.id}')">✕</button></div></div>`).join('')||'<div class="empty" style="padding:10px;font-size:13px">Нет категорий</div>';});
}

window.delCat=async function(id){
  S.cats=S.cats.filter(c=>c.id!==id);lsave();rSettings();
  try{await sb.from('categories').delete().eq('id',id);}catch(e){showErr('Ошибка: '+e.message);}toast('🗑 Удалено');
};
window.addCat=async function(){
  const name=document.getElementById('new-cat-name').value.trim(),emoji=document.getElementById('new-cat-emoji').value.trim()||'📌',type=document.getElementById('new-cat-type').value;
  if(!name){toast('Введите название');return;}

  try{const {error}=await sb.from('categories').insert({id,name,type,emoji,family_id:FID});if(error)throw new Error(error.message);setSyncStatus('ok');}
  catch(e){setSyncStatus('err');showErr('Ошибка: '+e.message);}
  document.getElementById('new-cat-name').value='';document.getElementById('new-cat-emoji').value='';
  toast('✅ Категория добавлена');
};

window.setPie=function(k,v){
  S.pie[k]=v;
  if(k==='type'){document.getElementById('ptab-expense').className='chip'+(v==='expense'?' on-red':'');document.getElementById('ptab-income').className='chip'+(v==='income'?' on-green':'');}
  if(k==='who'){document.getElementById('ptab-all').className='chip'+(v==='all'?' on-white':'');document.getElementById('ptab-vova').className='chip'+(v==='Вова'?' on-blue':'');document.getElementById('ptab-yulia').className='chip'+(v==='Юля'?' on-pink':'');}
  ['ptab-expense','ptab-income','ptab-all','ptab-vova','ptab-yulia'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.cssText='padding:7px 12px;font-size:12px';});
  drawPie();
};
window.openAnalytics=function(){
  document.getElementById('analytics-modal').classList.add('open');S.pie={type:'expense',who:'all'};
  document.getElementById('ptab-expense').className='chip on-red';document.getElementById('ptab-income').className='chip';
  document.getElementById('ptab-all').className='chip on-white';document.getElementById('ptab-vova').className='chip';document.getElementById('ptab-yulia').className='chip';
  ['ptab-expense','ptab-income','ptab-all','ptab-vova','ptab-yulia'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.cssText='padding:7px 12px;font-size:12px';});
  drawPie();
};
window.closeAnalytics=()=>document.getElementById('analytics-modal').classList.remove('open');
function drawPie(){
  const canvas=document.getElementById('pie-canvas'),ctx=canvas.getContext('2d'),mo=todayS().slice(0,7);
  let txs=S.txs.filter(t=>t.type===S.pie.type&&t.date.startsWith(mo));
  if(S.pie.who!=='all')txs=txs.filter(t=>t.by===S.pie.who);
  const tots={};txs.forEach(tx=>{tots[tx.cat]=(tots[tx.cat]||0)+tx.amount;});
  const entries=Object.entries(tots).sort((a,b)=>b[1]-a[1]),total=entries.reduce((s,[,v])=>s+v,0);
  ctx.clearRect(0,0,200,200);
  if(!entries.length){ctx.fillStyle='#444';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('Нет данных за месяц',100,105);document.getElementById('pie-legend').innerHTML='';return;}
  let angle=-Math.PI/2;
  entries.forEach(([cid,val],i)=>{const sl=(val/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(100,100);ctx.arc(100,100,90,angle,angle+sl);ctx.closePath();ctx.fillStyle=PAL[i%PAL.length];ctx.fill();angle+=sl;});
  ctx.beginPath();ctx.arc(100,100,48,0,Math.PI*2);ctx.fillStyle='#111118';ctx.fill();
  ctx.fillStyle='#666';ctx.font='600 12px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(fmtN(total),100,97);ctx.font='10px Inter,sans-serif';ctx.fillText('за месяц',100,112);
  document.getElementById('pie-legend').innerHTML=entries.map(([cid,val],i)=>{const cat=getC(cid),pct=Math.round(val/total*100);return`<div class="legend-item"><div class="legend-dot" style="background:${PAL[i%PAL.length]}"></div><span style="flex:1;color:#8A8A9A">${cat?cat.emoji+' '+cat.name:'—'}</span><span style="font-weight:700;color:#fff">${fmtN(val,S.currency)} <span style="color:#3A3A4A;font-weight:400">${pct}%</span></span></div>`;}).join('');
}

lload(); go('home'); loadCloud();
